---
apiVersion: apps/v1
kind: Deployment
metadata: { name: web }
spec:
  replicas: 2
  template:
    spec:
      containers:
        - name: web
          image: ghcr.io/acme/web:1.0.0
---
apiVersion: v1
kind: Service
metadata: { name: web }
spec:
  type: ClusterIP
  ports: [{ port: 80, targetPort: 8080 }]
